# Kitty Configuration

# Include theme (uncomment one to activate)
include rose-pine-dark.conf
# include rose-pine-light.conf

# Font settings
font_family JetBrains Mono
font_size 12.0

# Window settings
window_padding_width 10

# Tab bar
tab_bar_style fade
tab_bar_min_tabs 1

# Scrollback
scrollback_lines 10000

# Cursor shape
cursor_shape block

# Confirm on quit
confirm_os_window_close 0
