[main]
font=JetBrains Mono:size=13
prompt=Run: 
lines=12
width=34
horizontal-pad=24
vertical-pad=14
inner-pad=8
anchor=center
layer=top
terminal=kitty -e {cmd}
icons-enabled=yes
match-mode=fzf
sort-result=yes
use-bold=yes

[colors]
background=1e1b2eff
text=e0def4ff
prompt=eb6f92ff
placeholder=6e6a86ff
input=e0def4ff
match=eb6f92ff
selection=402a33ff
selection-text=ffffffff
selection-match=ffffffff
border=eb6f92ff

[border]
width=2
radius=0
selection-radius=0
